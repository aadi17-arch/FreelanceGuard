<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Satisfy&amp;display=swap');
    .stamp-bg {
      fill: #fafafa;
      stroke: #18181b;
      stroke-width: 3.5;
    }
    .letter-f {
      font-family: 'Satisfy', 'Brush Script MT', cursive;
      font-weight: bold;
      fill: #18181b;
      font-size: 34px;
    }
    .letter-g {
      font-family: 'Satisfy', 'Brush Script MT', cursive;
      font-weight: bold;
      fill: #059669;
      font-size: 34px;
    }
    .stamp-container {
      transform: rotate(-6deg);
      transform-origin: 32px 32px;
    }
  </style>
  <!-- Beautiful ambient shadow to match the 3D depth of the main logo -->
  <filter id="shadow" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse">
    <feDropShadow dx="0" dy="2.5" stdDeviation="1.5" flood-color="#18181b" flood-opacity="0.12" />
  </filter>
  <g class="stamp-container" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="27" ry="21" class="stamp-bg" />
    <text x="13" y="42" class="letter-f">F</text>
    <text x="29" y="42" class="letter-g">G</text>
  </g>
</svg>